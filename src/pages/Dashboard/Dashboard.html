<section class="pt-20  bg-[radial-gradient(ellipse_at_top_left,#274C25,#000)]">




     <div id="main-container" class="flex flex-col  justify-between gap-10 bg-[radial-gradient(ellipse_at_top_left,#274C25,#000)]">

          <div id=main-dash class="text-white! flex flex-row items-center justify-between    p-0">
               <div id="applications-container" class="m-0  p-0">

                    <div class="flex flex-col  items-center justify-center p-20">
                         <h2 class="text-white!  p-1 font-bold text-4xl">TOTAL APPLICATIONS </h2>
                         <p id="totalapps" class="text-5xl font-bold p-20"> </p>
                         
                    </div>

               </div>

               <div id="piechart" class="text-white! flex flex-col flex-1 items-center ">

                    <div id="chart" class="p-2 flex-1 w-fit h-fit">
                         <canvas id="myChart"></canvas>

                    </div>

                    <div id="stats" class=" flex flex-row items-center justify-around">
                         <div class=" flex flex-row items-center justify-center">
                              <h2 class="text-white! p-10">Applied </h2>
                              <p id="totalApplied" class="text-2xl font-bold p-4"> </p>


                         </div>

                         <div class="flex flex-row items-center justify-center">
                              <h2 class="text-white! p-10">total interviews </h2>
                              <p id="totalInterview" class="text-2xl font-bold p-4"> </p>


                         </div>

                         <div class="flex flex-row items-center justify-center">
                              <h2 class="text-white! p-10">total Offer </h2>
                              <p id="totalOffer" class="text-2xl font-bold p-4"> </p>


                         </div>
                         <div class="flex flex-row items-center justify-center">
                              <h2 class="text-white! p-10">total Rejected </h2>
                              <p id="totalRejected" class="text-2xl font-bold p-4"> </p>


                         </div>






                    </div>



               </div>

          </div>


          <div id="recent-entry" class="text-white!  rounded-xl shadow p-15">
               <h2 class="text-white! text-lg font-semibold mb-4 text-center">
                    Recent Entry
               </h2>
               <div id="latest-entry" class="space-y-2 text-sm ">
                    <div class="flex justify-between">
                         <span >Company</span>
                         <span id="company" class="font-medium">-</span>

                    </div>
                    <div class="flex justify-between">
                         <span >Role</span>
                         <span id="role" class="font-medium">-</span>

                    </div>
                    <div class="flex justify-between">
                         <span >Date</span>
                         <span id="date" class="font-medium">-</span>

                    </div>
                    <div class="flex justify-between">
                         <span >Status</span>
                         <span id="status" class="font-medium">-</span>

                    </div>
                    <div class="flex justify-between">
                         <span >Location</span>
                         <span id="location" class="font-medium">-</span>

                    </div>


               </div>


          </div>

          <div id="response-rate" class=" text-white  p-5 flex flex-col items-center justify-between ">
               <h1 class="text-white! text-center pt-0 pb-5 ">
                    Response Rate

               </h1>
               <div id="responsestats" class="flex flex-row justify-between items-center gap-20 mt-2" >
                    <div class="flex flex-col items-center gap-4">
                         <h2 class="text-white!">
                              Interview Rate
                         </h2>
                         <span id="interviewRate" class="text-3xl"></span>
                    </div>
                    <div class="flex flex-col items-center gap-4">
                         <h2 class="text-white!">
                              Offer Rate
                         </h2>
                         <span id="offerRate" class="text-3xl"></span>
                    </div>
                    <div class="flex flex-col items-center gap-4">
                         <h2 class="text-white!">
                              Response Rate
                         </h2>
                         <span id="responseRate" class="text-3xl"></span>
                    </div>

               </div>

          </div>



     </div>















</section>
